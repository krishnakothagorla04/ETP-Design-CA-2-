# DB credentials - do not commit real passwords; use placeholders and override in CI or locally.
# Create with: kubectl create secret generic postgres-credentials -n checkout-demo --from-literal=POSTGRES_USER=checkout --from-literal=POSTGRES_PASSWORD=changeme --from-literal=POSTGRES_DB=checkout --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: checkout-demo
type: Opaque
stringData:
  POSTGRES_USER: checkout
  POSTGRES_PASSWORD: changeme
  POSTGRES_DB: checkout
