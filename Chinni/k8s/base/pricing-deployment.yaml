apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing
  namespace: checkout-demo
  labels:
    app: pricing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pricing
  template:
    metadata:
      labels:
        app: pricing
    spec:
      containers:
        - name: pricing
          image: chinni-pricing:latest # replace with your pushed image name
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: pricing
  namespace: checkout-demo
  labels:
    app: pricing
spec:
  selector:
    app: pricing
  ports:
    - name: http
      port: 8001
      targetPort: 8001

